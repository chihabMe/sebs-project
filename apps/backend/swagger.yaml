openapi: 3.0.0
info:
  title: SEBS API
  description: Smart Event Booking System API Documentation
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                email:
                  type: string
                name:
                  type: string
                role:
                  type: string
            token:
              type: string
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                role:
                  type: string
                  enum: [USER, ORGANIZER]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error or email exists
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              description: accessToken and refreshToken cookies
              schema:
                type: string
        '401':
          description: Invalid credentials
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token using refresh token cookie
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid or expired refresh token
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user (clears cookies)
      responses:
        '200':
          description: Logged out successfully
  /events:
    get:
      tags:
        - Events
      summary: Get list of events (Public)
      security: []
      responses:
        '200':
          description: A list of events
    post:
      tags:
        - Events
      summary: Create a new event (Organizer/Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - date
                - location
                - category
                - maxTickets
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                location:
                  type: string
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                maxTickets:
                  type: integer
                price:
                  type: number
      responses:
        '201':
          description: Event created
  /events/{id}:
    get:
      tags:
        - Events
      summary: Get event details
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event details
  /bookings:
    post:
      tags:
        - Bookings
      summary: Book tickets for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
              properties:
                eventId:
                  type: string
      responses:
        '201':
          description: Booking successful
        '400':
          description: Event full or already booked
  /bookings/my:
    get:
      tags:
        - Bookings
      summary: Get my bookings
      responses:
        '200':
          description: A list of user's bookings
  /reviews/event/{eventId}:
    get:
      tags:
        - Reviews
      summary: Get reviews for an event (Public)
      security: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A list of reviews
    post:
      tags:
        - Reviews
      summary: Add a review for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - rating
              properties:
                eventId:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review created
        '400':
          description: User must have confirmed booking
