name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint || echo "No lint script defined in root, skipping..."

      - name: Build Shared
        run: pnpm --filter=@sebs/shared run build

      - name: Build Backend
        run: |
          cd apps/backend
          npx prisma generate
          pnpm run build

      - name: Build Frontend
        run: pnpm --filter=@sebs/frontend run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t sebs-backend -f apps/backend/Dockerfile .

      - name: Build Frontend Image
        run: docker build -t sebs-frontend -f apps/frontend/Dockerfile .
