services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?TRAEFIK_ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-network

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: backend-runtime
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URLS: ${FRONTEND_URLS:?FRONTEND_URLS is required}
      FRONTEND_PUBLIC_URL: ${WEB_APP_URL:?WEB_APP_URL is required}
      WEB_APP_URL: ${WEB_APP_URL:?WEB_APP_URL is required}
      FIRESTORE_PROJECT_ID: ${FIRESTORE_PROJECT_ID:?FIRESTORE_PROJECT_ID is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM is required}
    restart: unless-stopped
    networks:
      - sebs
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eventify-backend.rule=Host(`${API_DOMAIN:?API_DOMAIN is required}`)"
      - "traefik.http.routers.eventify-backend.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-backend.tls=true"
      - "traefik.http.routers.eventify-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eventify-backend-web.rule=Host(`${APP_DOMAIN:?APP_DOMAIN is required}`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`))"
      - "traefik.http.routers.eventify-backend-web.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-backend-web.tls=true"
      - "traefik.http.routers.eventify-backend-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eventify-backend-web.priority=100"
      - "traefik.http.routers.eventify-backend-admin.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN is required}`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`))"
      - "traefik.http.routers.eventify-backend-admin.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-backend-admin.tls=true"
      - "traefik.http.routers.eventify-backend-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eventify-backend-admin.priority=100"
      - "traefik.http.services.eventify-backend.loadbalancer.server.port=4000"
      - "traefik.docker.network=traefik-network"

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: frontend-runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ADMIN_URL: ${ADMIN_APP_URL:?ADMIN_APP_URL is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sebs
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eventify-frontend.rule=Host(`${APP_DOMAIN:?APP_DOMAIN is required}`)"
      - "traefik.http.routers.eventify-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-frontend.tls=true"
      - "traefik.http.routers.eventify-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.eventify-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

  admin:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: admin-runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WEB_URL: ${WEB_APP_URL:?WEB_APP_URL is required}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sebs
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eventify-admin.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN is required}`)"
      - "traefik.http.routers.eventify-admin.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-admin.tls=true"
      - "traefik.http.routers.eventify-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.eventify-admin.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_LEVEL: info
      DOZZLE_HOSTNAME: Eventify Logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sebs
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eventify-logs.rule=Host(`${LOGS_DOMAIN:?LOGS_DOMAIN is required}`)"
      - "traefik.http.routers.eventify-logs.entrypoints=web,websecure"
      - "traefik.http.routers.eventify-logs.tls=true"
      - "traefik.http.routers.eventify-logs.tls.certresolver=letsencrypt"
      - "traefik.http.services.eventify-logs.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-network"

networks:
  sebs:
  traefik-network:
volumes:
  traefik-letsencrypt:
