<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | The Electric Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#360024",
                      "tertiary-container": "#fd8bca",
                      "on-surface": "#32294f",
                      "on-error-container": "#510017",
                      "outline": "#7b719c",
                      "on-background": "#32294f",
                      "primary": "#4a40e0",
                      "background": "#faf4ff",
                      "surface-container": "#ede4ff",
                      "secondary-fixed-dim": "#7ae7d8",
                      "primary-dim": "#3d30d4",
                      "secondary-container": "#89f5e7",
                      "on-tertiary": "#ffeff4",
                      "tertiary-fixed": "#fd8bca",
                      "on-secondary-fixed": "#004841",
                      "surface-container-high": "#e8deff",
                      "outline-variant": "#b2a6d5",
                      "inverse-primary": "#8582ff",
                      "tertiary": "#983772",
                      "error-dim": "#a70138",
                      "surface-bright": "#faf4ff",
                      "surface-container-low": "#f5eeff",
                      "inverse-surface": "#10062d",
                      "surface-container-highest": "#e2d7ff",
                      "on-primary-fixed": "#000000",
                      "surface-dim": "#dacdff",
                      "on-error": "#ffefef",
                      "on-secondary-fixed-variant": "#00675e",
                      "on-tertiary-fixed-variant": "#6d104e",
                      "surface-variant": "#e2d7ff",
                      "secondary-fixed": "#89f5e7",
                      "on-tertiary-container": "#610244",
                      "on-secondary-container": "#005c54",
                      "surface-tint": "#4a40e0",
                      "on-primary-fixed-variant": "#1a0099",
                      "error-container": "#f74b6d",
                      "on-secondary": "#bffff5",
                      "primary-container": "#9795ff",
                      "error": "#b41340",
                      "secondary": "#00675e",
                      "on-primary": "#f4f1ff",
                      "primary-fixed-dim": "#8885ff",
                      "surface": "#faf4ff",
                      "secondary-dim": "#005a52",
                      "on-primary-container": "#14007e",
                      "primary-fixed": "#9795ff",
                      "tertiary-fixed-dim": "#ee7ebc",
                      "tertiary-dim": "#892a65",
                      "on-surface-variant": "#5f557f",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#a296c4"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
      },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Not rendered for Transactional Login Flow -->
<header class="fixed top-0 w-full z-50 bg-[#faf4ff]/80 backdrop-blur-xl flex justify-center items-center px-6 py-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="bolt">bolt</span>
<h1 class="text-xl font-black text-on-surface font-headline tracking-tight">The Electric Editorial</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<!-- Background Ambient Kinetic Element -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute top-1/2 -right-24 w-64 h-64 rounded-full bg-secondary-container/10 blur-[80px]"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-md relative z-10">
<div class="bg-surface-container-low rounded-xl p-8 md:p-12 shadow-[0_20px_40px_rgba(50,41,79,0.06)] relative overflow-hidden group">
<!-- Kinetic Curator Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-primary/5 to-transparent rounded-bl-full"></div>
<div class="relative">
<header class="mb-10">
<h2 class="text-3xl font-extrabold font-headline text-on-surface tracking-tight mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-medium">Access your curated event dashboard.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[0.75rem] font-bold text-on-surface uppercase tracking-widest block ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="email" name="email" placeholder="name@domain.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[0.75rem] font-bold text-on-surface uppercase tracking-widest block" for="password">Password</label>
<a class="text-[0.75rem] font-bold text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Alternative Login Methods -->
<div class="mt-8 pt-8 relative">
<div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface font-semibold py-3 rounded-xl hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" data-icon="brand_awareness">brand_awareness</span>
<span class="text-xs">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface font-semibold py-3 rounded-xl hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" data-icon="apple">ios</span>
<span class="text-xs">Apple</span>
</button>
</div>
</div>
</div>
</div>
<!-- Bottom Registration Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Register</a>
</p>
</div>
</div>
</main>
<!-- Simple Transactional Footer -->
<footer class="w-full py-8 px-6 mt-auto flex flex-col md:flex-row justify-center items-center gap-6">
<div class="text-[0.75rem] text-on-surface-variant/60 font-medium tracking-wide">
            © 2024 SEBS Editorial. All Rights Reserved.
        </div>
<div class="flex gap-6">
<a class="text-[0.75rem] font-bold text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[0.75rem] font-bold text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[0.75rem] font-bold text-on-surface-variant hover:text-primary transition-colors" href="#">Help</a>
</div>
</footer>
</body></html>
