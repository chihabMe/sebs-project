<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Electric Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "inverse-surface": "#10062d",
                        "on-secondary-container": "#005c54",
                        "tertiary": "#983772",
                        "error": "#b41340",

                        "surface-container-low": "#f5eeff",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .asymmetric-shape {
            clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Suppressed Navigation Shell for Transactional Focus -->
<main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-0 overflow-hidden bg-surface-container-lowest rounded-xl shadow-none">
<!-- Left Side: Visual/Editorial Energy -->
<section class="hidden md:flex md:col-span-5 relative bg-primary overflow-hidden min-h-[600px]">
<img class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay" data-alt="Dynamic shot of a high-end concert with vibrant purple and teal lighting and a blurred crowd in a premium editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPrKPvw0DXmC-g9HRI5RfeTdbLJj1TKHtqr77eJ6ZMvHcxvtjBEd_B7MdffpmvwRC3vX2_aODFp3hNN4Uebbn7HFpgGtwaflS7Q8StupxesEKPokn3eaSC1eXhlCT53Uf2b8wjKVqMAg7ko_ks8tbm9q4fz2Ont-YD5FzFjVsIo_uQt0MElYvuFzAXrnKPNcpIrZWHEehZMmt9cK5QVJAIq44eX7MciRIdonO1NKsy0NolHF4sLkUD4A44Q8DZNTwskScNk2DiMAA"/>
<div class="relative z-10 p-12 flex flex-col justify-between h-full">
<div>
<h1 class="text-on-primary text-4xl font-extrabold tracking-tighter leading-none mb-4">
                        Electric<br/>Editorial
                    </h1>
<div class="w-12 h-1 bg-secondary rounded-full"></div>
</div>
<div class="space-y-6">
<p class="text-on-primary text-2xl font-headline tracking-tight leading-tight">
                        Join the pulse of the city's most kinetic curation.
                    </p>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="text-on-primary/80 font-label text-xs uppercase tracking-widest">Live Registration Active</span>
</div>
</div>
</div>
<!-- Kinetic Graphic Overlay -->
<div class="absolute bottom-0 right-0 w-32 h-32 bg-secondary opacity-20 blur-3xl rounded-full translate-x-10 translate-y-10"></div>
</section>
<!-- Right Side: Clean Focus Registration Form -->
<section class="col-span-1 md:col-span-7 p-8 md:p-16 flex flex-col justify-center">
<div class="max-w-md mx-auto w-full">
<header class="mb-10">
<h2 class="text-on-surface text-3xl font-bold tracking-tight mb-2">Create Account</h2>
<p class="text-on-surface-variant text-sm">Sign up to SEBS and start curating your experience.</p>
</header>
<form class="space-y-6">
<!-- Role Toggle -->
<div class="space-y-3">
<label class="text-on-surface-variant font-label text-xs uppercase tracking-widest font-semibold">I am an</label>
<div class="grid grid-cols-2 p-1 bg-surface-container-high rounded-xl gap-1">
<button class="py-2.5 px-4 rounded-lg bg-surface-container-lowest text-primary text-sm font-bold shadow-sm transition-all" type="button">
                                Attendee
                            </button>
<button class="py-2.5 px-4 rounded-lg text-on-surface-variant text-sm font-medium hover:bg-surface-container-lowest/50 transition-all" type="button">
                                Organizer
                            </button>
</div>
</div>
<div class="space-y-4">
<!-- Name Field -->
<div class="group">
<label class="block text-on-surface-variant font-label text-xs uppercase tracking-widest mb-2 font-semibold" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="person">person</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="name" placeholder="Alex Rivera" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="group">
<label class="block text-on-surface-variant font-label text-xs uppercase tracking-widest mb-2 font-semibold" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="email" placeholder="alex@editorial.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-on-surface-variant font-label text-xs uppercase tracking-widest mb-2 font-semibold" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-high" id="terms" type="checkbox"/>
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                            I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transform active:scale-[0.98] transition-all" type="submit">
                        Create Account
                    </button>
<div class="pt-8 text-center border-t border-outline-variant/10">
<p class="text-on-surface-variant text-sm">
                            Already have an account? 
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Login here</a>
</p>
</div>
</form>
</div>
</section>
</main>
<!-- Simple Footer (Suppressed Brand Logo) -->
<footer class="fixed bottom-0 w-full py-6 flex flex-col items-center justify-center gap-2 px-4 pointer-events-none">
<p class="font-['Inter'] text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/40">
            © 2024 THE ELECTRIC EDITORIAL. KINETIC CURATION FOR LIVE EVENTS.
        </p>
</footer>
</body></html>
